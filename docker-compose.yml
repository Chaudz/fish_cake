services:
  postgres:
    image: postgres:16-alpine
    container_name: banchaca_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: banchaca
      POSTGRES_PASSWORD: banchaca123
      POSTGRES_DB: banchaca
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U banchaca -d banchaca"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: banchaca_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://banchaca:banchaca123@postgres:5432/banchaca
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      JWT_EXPIRES_IN: 7d
      PORT: 3001
      FRONTEND_URL: http://localhost:3000
      BANK_QR_CONTENT: "Chuyen khoan: 0123456789 - Ngan hang ABC"
    ports:
      - "3001:3001"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: banchaca_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
    ports:
      - "3000:3000"

volumes:
  postgres_data:
